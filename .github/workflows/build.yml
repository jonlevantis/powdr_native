name: Build powdR

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            "PyQt6==6.7.1" \
            "PyQt6-Qt6==6.7.1" \
            pandas numpy scipy matplotlib \
            "pyinstaller==6.7.0"

      - name: Clean previous build artifacts
        run: rm -rf build dist

      - name: Build (with symlink patch)
        run: python3 build_macos.py

      - name: Assemble .app bundle
        run: |
          APP=dist/powdR.app
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"
          cp -R dist/powdR/. "$APP/Contents/MacOS/"
          python3 -c "
          plist = '''<?xml version=\"1.0\" encoding=\"UTF-8\"?>
          <!DOCTYPE plist PUBLIC \"-//Apple//DTD PLIST 1.0//EN\" \"http://www.apple.com/DTDs/PropertyList-1.0.dtd\">
          <plist version=\"1.0\">
          <dict>
            <key>CFBundleExecutable</key><string>powdR</string>
            <key>CFBundleIdentifier</key><string>com.powdr.xrpd</string>
            <key>CFBundleName</key><string>powdR</string>
            <key>CFBundleDisplayName</key><string>powdR</string>
            <key>CFBundleShortVersionString</key><string>1.0.0</string>
            <key>NSHighResolutionCapable</key><true/>
            <key>LSBackgroundOnly</key><false/>
          </dict>
          </plist>'''
          open('dist/powdR.app/Contents/Info.plist', 'w').write(plist)
          print('Info.plist written')
          "
          ls -la "$APP/Contents/MacOS/" | head -10

      - name: Zip .app for download
        run: cd dist && zip -r powdR-mac.zip powdR.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: powdR-mac
          path: dist/powdR-mac.zip
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install "PyQt6==6.7.1" "PyQt6-Qt6==6.7.1" pandas numpy scipy matplotlib "pyinstaller==6.7.0"

      - name: Build .exe
        run: pyinstaller --clean powdr_windows.spec

      - name: Zip dist folder
        run: cd dist && Compress-Archive -Path powdR -DestinationPath powdR-windows.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: powdR-windows
          path: dist/powdR-windows.zip
          retention-days: 30
