name: Build powdR

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            "PyQt6==6.7.1" \
            "PyQt6-Qt6==6.7.1" \
            pandas numpy scipy matplotlib \
            "pyinstaller==6.7.0"

      - name: Clean previous build artifacts
        run: rm -rf build dist

      - name: Build (COLLECT only, no BUNDLE)
        run: pyinstaller powdr_native.spec

      - name: Manually assemble .app bundle
        run: |
          # Create the .app structure manually
          APP=dist/powdR.app
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"

          # Move the COLLECT output into the bundle
          mv dist/powdR "$APP/Contents/MacOS/powdR_internal"

          # Copy the executable to the standard MacOS location
          cp "$APP/Contents/MacOS/powdR_internal/powdR" "$APP/Contents/MacOS/powdR"

          # Write Info.plist
          cat > "$APP/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>powdR</string>
            <key>CFBundleIdentifier</key>
            <string>com.powdr.xrpd</string>
            <key>CFBundleName</key>
            <string>powdR</string>
            <key>CFBundleDisplayName</key>
            <string>powdR</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>LSBackgroundOnly</key>
            <false/>
          </dict>
          </plist>
          PLIST

          echo "App bundle assembled at $APP"
          ls -la "$APP/Contents/MacOS/"

      - name: Zip .app for download
        run: cd dist && zip -r powdR-mac.zip powdR.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: powdR-mac
          path: dist/powdR-mac.zip
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install "PyQt6==6.7.1" "PyQt6-Qt6==6.7.1" pandas numpy scipy matplotlib "pyinstaller==6.7.0"

      - name: Build .exe
        run: pyinstaller --clean powdr_windows.spec

      - name: Zip dist folder
        run: cd dist && Compress-Archive -Path powdR -DestinationPath powdR-windows.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: powdR-windows
          path: dist/powdR-windows.zip
          retention-days: 30
